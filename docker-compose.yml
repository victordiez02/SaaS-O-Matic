services:
  backend:
    build: ./backend
    container_name: saas-backend
    environment:
      - DATABASE_PATH=/app/data/saas_o_matic.db
    volumes:
      - ./data:/app/data
    ports:
      - "8000:8000"

  frontend:
    build: ./frontend
    container_name: saas-frontend
    ports:
      - "8080:80"
    depends_on:
      - backend
